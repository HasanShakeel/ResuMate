<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Builder — Create Your Resume</title>
    <meta name="description" content="Build your professional resume with our step-by-step wizard and live preview.">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="/static/css/variables.css?v=1.0.9">
    <link rel="stylesheet" href="/static/css/base.css?v=1.0.9">
    <link rel="stylesheet" href="/static/css/components.css?v=1.0.9">
    <link rel="stylesheet" href="/static/css/builder.css?v=1.0.9">
</head>
<body class="builder-body">
    <!-- ===== BUILDER HEADER ===== -->
    <header class="builder-header" id="builder-header">
        <div class="builder-header-left">
            <a href="/" class="nav-logo">
                <span class="logo-icon">📄</span>
                <span class="logo-text">ResumeBuilder<span class="logo-dot">.</span></span>
            </a>
        </div>
        <div class="builder-header-center">
            <span class="save-status" id="save-status">
                <span class="save-dot"></span>
                <span class="save-text">Auto-saved</span>
            </span>
        </div>
        <div class="builder-header-right">
            <button class="btn btn-ghost btn-sm" id="btn-profiles" title="Manage Profiles">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                Profiles
            </button>
            <button class="btn btn-ghost btn-sm" id="btn-toggle-preview" title="Toggle Preview">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                Preview
            </button>
            <button class="btn btn-primary btn-sm" id="btn-download-pdf">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Download PDF
            </button>
        </div>
    </header>

    <!-- ===== MAIN BUILDER LAYOUT ===== -->
    <main class="builder-main" id="builder-main">
        <!-- LEFT: Form Panel -->
        <div class="builder-form-panel" id="form-panel">
            <!-- Stepper Navigation -->
            <nav class="builder-stepper" id="stepper-nav">
                <!-- Stepper steps populated by JS -->
            </nav>

            <!-- Form Content Area -->
            <div class="builder-form-content" id="form-content">
                <!-- Form components rendered here by JS -->
                <div class="form-loading">
                    <div class="skeleton" style="height: 40px; width: 60%; margin-bottom: 16px;"></div>
                    <div class="skeleton" style="height: 20px; width: 80%; margin-bottom: 12px;"></div>
                    <div class="skeleton" style="height: 44px; width: 100%; margin-bottom: 12px;"></div>
                    <div class="skeleton" style="height: 44px; width: 100%; margin-bottom: 12px;"></div>
                    <div class="skeleton" style="height: 44px; width: 100%;"></div>
                </div>
            </div>

            <!-- Form Navigation Buttons -->
            <div class="builder-form-nav" id="form-nav">
                <button type="button" class="btn btn-secondary" id="btn-prev-step" disabled>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
                    Previous
                </button>
                <button type="button" class="btn btn-primary" id="btn-next-step">
                    Next
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
                </button>
            </div>
        </div>

        <!-- Resizable Divider -->
        <div class="builder-divider" id="builder-divider">
            <div class="divider-handle"></div>
        </div>

        <!-- RIGHT: Preview Panel -->
        <div class="builder-preview-panel" id="preview-panel">
            <div class="preview-toolbar" id="preview-toolbar">
                <span class="preview-label">Live Preview</span>
                <div class="preview-controls">
                    <span id="preview-page-indicator" style="display: none; padding: 4px 10px; font-size: 11px; font-weight: 600; border-radius: 12px; margin-right: 12px; color: white;">1 Page</span>
                    <select class="form-select preview-zoom-select" id="preview-zoom" title="Zoom">
                        <option value="auto" selected>Auto Fit</option>
                        <option value="0.5">50%</option>
                        <option value="0.75">75%</option>
                        <option value="1">100%</option>
                    </select>
                </div>
            </div>
            <div class="preview-container" id="preview-container">
                <div class="preview-iframe-wrapper" id="preview-iframe-wrapper">
                    <iframe class="preview-iframe" id="preview-iframe" title="Resume Preview" sandbox="allow-same-origin"></iframe>
                </div>
            </div>
        </div>
    </main>

    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <!-- Profiles Manager Modal -->
    <div class="custom-modal-overlay" id="profiles-modal-overlay">
        <div class="custom-modal-card profiles-modal-card">
            <div class="custom-modal-header">
                <div style="display: flex; align-items: center; gap: 8px;">
                    <span class="custom-modal-icon">📄</span>
                    <h3 style="margin:0;">My Resumes</h3>
                </div>
                <button class="btn-close-modal" id="profiles-modal-close" style="background:none; border:none; font-size: 24px; cursor: pointer; color: var(--color-text-secondary);">&times;</button>
            </div>
            <div class="profiles-list-container" id="profiles-list-container">
                <!-- Profiles populated by JS -->
            </div>
            <div class="create-profile-form">
                <input type="text" id="new-profile-name" class="form-input" placeholder="Name for new resume (e.g. Frontend Dev)">
                <button class="btn btn-primary" id="btn-create-profile" style="width: 100%; margin-top: 8px;">Create New CV</button>
            </div>
        </div>
    </div>

    <!-- Scripts — loaded in dependency order -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <script src="/static/js/utils/helpers.js?v=1.0.9"></script>
    <script src="/static/js/utils/validation.js?v=1.0.9"></script>
    <script src="/static/js/utils/drag-drop.js?v=1.0.9"></script>
    <script src="/static/js/store.js?v=1.1.2"></script>
    <script src="/static/js/api.js?v=1.1.2"></script>
    <script src="/static/js/preview.js?v=1.1.2"></script>
    <script src="/static/js/components/stepper.js?v=1.1.2"></script>
    <script src="/static/js/components/personal-info.js?v=1.0.9"></script>
    <script src="/static/js/components/summary.js?v=1.0.9"></script>
    <script src="/static/js/components/experience.js?v=1.1.1"></script>
    <script src="/static/js/components/education.js?v=1.1.1"></script>
    <script src="/static/js/components/projects.js?v=1.1.1"></script>
    <script src="/static/js/components/skills.js?v=1.0.9"></script>
    <script src="/static/js/components/additional.js?v=1.0.9"></script>
    <script src="/static/js/components/arrange.js?v=1.0.9"></script>
    <script src="/static/js/components/template-selector.js?v=1.0.9"></script>
    <script src="/static/js/components/review.js?v=1.0.9"></script>
    <script src="/static/js/components/download.js?v=1.0.9"></script>
    <script src="/static/js/components/profiles-modal.js?v=1.0.9"></script>
    <script src="/static/js/app.js?v=1.0.9"></script>
</body>
</html>
