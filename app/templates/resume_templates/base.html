<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ full_name or 'Resume' }}</title>

    <!-- Google Fonts — Standard + User Options -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Sans+3:ital,wght@0,400;0,600;1,400&family=Poppins:wght@400;500;600;700&family=Roboto:wght@400;500;700&family=Open+Sans:wght@400;600;700&family=Lato:wght@400;700&family=Montserrat:wght@400;500;600;700&family=Oswald:wght@400;500;600&family=Merriweather:wght@400;700&family=Playfair+Display:wght@400;600;700&family=Lora:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        {{ template_css }}
        
        /* User Formatting Overrides */
        {% if resume.theme_settings %}
        :root {
            --user-section-gap: {% if resume.theme_settings.section_spacing == 'compact' %}0.75rem{% elif resume.theme_settings.section_spacing == 'relaxed' %}1.5rem{% else %}1rem{% endif %};
            --user-line-height: {% if resume.theme_settings.line_spacing == 'tight' %}1.25{% elif resume.theme_settings.line_spacing == 'loose' %}1.8{% else %}1.5{% endif %};
            {% if resume.theme_settings.font_family and resume.theme_settings.font_family != 'default' %}
            --font-heading: {{ resume.theme_settings.font_family | safe }} !important;
            --font-body: {{ resume.theme_settings.font_family | safe }} !important;
            {% endif %}
        }
        .resume-page {
            line-height: var(--user-line-height) !important;
            text-align: {{ resume.theme_settings.text_alignment or 'left' }} !important;
            {% if resume.theme_settings.font_family and resume.theme_settings.font_family != 'default' %}
            font-family: {{ resume.theme_settings.font_family | safe }} !important;
            {% endif %}
        }
        .resume-section {
            margin-bottom: var(--user-section-gap) !important;
        }
        .resume-section:last-child {
            margin-bottom: 0 !important;
        }
        {% endif %}

        /* PDF Export Fixes for headless Chromium */
        @media print {
            .resume-page {
                width: 100% !important;
                margin: 0 !important;
                box-shadow: none !important;
                border: none !important;
            }
        }
    </style>
</head>
<body>
    <div class="resume-page" data-page-size="{{ page_size }}">
        {% block content %}
        <!-- Content is provided by child templates -->
        {% endblock %}
    </div>
</body>
</html>
